<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>SR IDEAS</title>

  <link rel="stylesheet" href="/static/style.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
  <main class="login-screen">
    <section class="login-card">
      <div class="login-icon">
        <i data-lucide="lock-keyhole"></i>
      </div>

      <h1>SR MediaDrop</h1>
      <p>Ingresa tu PIN para continuar.</p>

      <input id="pinInput" type="password" placeholder="PIN de acceso" maxlength="8" />

      <button onclick="login()" class="login-btn">
        <i data-lucide="log-in"></i>
        Entrar
      </button>
    </section>

    <div id="modalOverlay" class="modal-overlay hidden">
      <div class="modal">
        <div id="modalIcon" class="modal-icon">
          <i data-lucide="info"></i>
        </div>

        <h3 id="modalTitle">Título</h3>
        <p id="modalMessage">Mensaje</p>

        <button onclick="closeModal()" class="modal-btn">
          Aceptar
        </button>
      </div>
    </div>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);

    function showModal(type, title, message) {
      const overlay = $("modalOverlay");
      const iconBox = $("modalIcon");
      const titleBox = $("modalTitle");
      const messageBox = $("modalMessage");

      let icon = "info";

      if (type === "success") icon = "check-circle";
      if (type === "error") icon = "circle-x";
      if (type === "warning") icon = "triangle-alert";

      iconBox.className = `modal-icon ${type}`;
      iconBox.innerHTML = `<i data-lucide="${icon}"></i>`;

      titleBox.textContent = title;
      messageBox.textContent = message;

      overlay.classList.remove("hidden");
      lucide.createIcons();
    }

    function closeModal() {
      $("modalOverlay").classList.add("hidden");
      $("pinInput").focus();
    }

    async function login() {
      const pin = $("pinInput").value.trim();

      if (!pin) {
        showModal("warning", "PIN requerido", "Ingresa tu PIN para continuar.");
        return;
      }

      try {
        const res = await fetch("/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ pin })
        });

        const data = await res.json();

        if (!data.success) {
          $("pinInput").value = "";
          showModal("error", "PIN incorrecto", "El PIN ingresado no es válido. Intenta nuevamente.");
          return;
        }

        window.location.href = "/";

      } catch {
        showModal("error", "Error de conexión", "No se pudo validar el PIN. Revisa que el servidor esté activo.");
      }
    }

    $("pinInput").addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        login();
      }
    });

    lucide.createIcons();
  </script>
</body>
</html>
